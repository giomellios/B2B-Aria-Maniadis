version: '3.8'
services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: vendure
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vendure-b2b
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  meilisearch:
    image: getmeili/meilisearch:v1.6
    restart: always
    environment:
      MEILI_MASTER_KEY: masterKey123
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meili-data:/meili_data

volumes:
  db-data:
  meili-data: